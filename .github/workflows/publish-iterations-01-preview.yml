name: Publish iterations-01 preview

on:
  push:
    branches:
      - iterations-01
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iterations-01-preview
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout iterations-01
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        env:
          VITE_BASE: /progression-system/previews/iterations-01/
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare main worktree
        run: |
          git fetch origin main
          git worktree add ../preview-main origin/main

      - name: Publish preview files into main
        run: |
          rm -rf ../preview-main/public/previews/iterations-01
          mkdir -p ../preview-main/public/previews/iterations-01
          cp -R dist/. ../preview-main/public/previews/iterations-01/

      - name: Commit preview update
        working-directory: ../preview-main
        run: |
          git add public/previews/iterations-01
          if git diff --cached --quiet; then
            echo "No preview changes to commit."
            exit 0
          fi
          git commit -m "Update iterations-01 preview"

      - name: Push main
        working-directory: ../preview-main
        run: git push origin HEAD:main
